app = 'yurukake-api'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile.prod'

[env]
  APP_ENV = 'production'
  APP_DEBUG = 'false'
  DB_CONNECTION = 'pgsql'
  LOG_CHANNEL = 'stderr'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
